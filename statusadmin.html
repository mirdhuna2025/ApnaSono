<!DOCTYPE html>
<html>
<head>
<title>Status Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.status{
border:1px solid #ddd;
padding:10px;
margin-top:15px;
border-radius:8px;
}

.status img, .status video{
max-width:200px;
display:block;
margin-top:10px;
}

button{
padding:6px 10px;
margin-top:8px;
margin-right:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Status Admin Panel</h2>

<div id="statusList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getDatabase,
ref,
onValue,
remove,
update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain: "mirdhuna-25542.firebaseapp.com",
databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId: "mirdhuna-25542",
storageBucket: "mirdhuna-25542.firebasestorage.app",
messagingSenderId: "575924409876",
appId: "1:575924409876:web:6ba1ed88ce941d9c83b901"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const statusList = document.getElementById("statusList");

const statusRef = ref(db,"status");

onValue(statusRef,(snapshot)=>{

statusList.innerHTML="";

snapshot.forEach(data=>{

const status=data.val();
const id=data.key;

const div=document.createElement("div");
div.className="status";

let media="";

if(status.type && status.type.startsWith("image")){
media=`<img src="${status.url}">`;
}
else if(status.type && status.type.startsWith("video")){
media=`<video src="${status.url}" controls></video>`;
}

div.innerHTML=`

<p><b>User:</b> ${status.name || "Anonymous"}</p>
<p><b>Time:</b> ${new Date(status.time).toLocaleString()}</p>

${media}

<br>

<button onclick="deleteStatus('${id}')">Delete</button>

<button onclick="editName('${id}','${status.name || ""}')">Edit Name</button>

`;

statusList.appendChild(div);

});

});

window.deleteStatus=function(id){

if(confirm("Delete this status?")){

remove(ref(db,"status/"+id));

}

}

window.editName=function(id,oldName){

const newName=prompt("Edit name",oldName);

if(newName){

update(ref(db,"status/"+id),{
name:newName
});

}

}

</script>

</body>
</html>
