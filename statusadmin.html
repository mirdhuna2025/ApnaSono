<!DOCTYPE html>
<html>
<head>
<title>Admin Status Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

.status{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.status img{
max-width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Status Upload</h2>

<textarea id="statusText" placeholder="Write status"></textarea>

<input type="file" id="statusImage">

<button onclick="postStatus()">Upload Status</button>

<hr>

<h3>All Status</h3>

<div id="statusContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getDatabase,
ref,
push,
onValue,
remove,
update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
getStorage,
ref as sRef,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain: "mirdhuna-25542.firebaseapp.com",
databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId: "mirdhuna-25542",
storageBucket: "mirdhuna-25542.firebasestorage.app",
messagingSenderId: "575924409876",
appId: "1:575924409876:web:6ba1ed88ce941d9c83b901",
measurementId: "G-YB7LDKHBPV"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

const statusRef = ref(db,"status");

const container = document.getElementById("statusContainer");


window.postStatus = function(){

const text = document.getElementById("statusText").value;
const file = document.getElementById("statusImage").files[0];

if(file){

const imageRef = sRef(storage,"statusImages/"+Date.now());

uploadBytes(imageRef,file).then(()=>{

getDownloadURL(imageRef).then((url)=>{

push(statusRef,{
text:text,
image:url,
time:Date.now()
});

});

});

}else{

push(statusRef,{
text:text,
time:Date.now()
});

}

document.getElementById("statusText").value="";
document.getElementById("statusImage").value="";

}


onValue(statusRef,(snapshot)=>{

container.innerHTML="";

snapshot.forEach((child)=>{

const data = child.val();
const id = child.key;

const div = document.createElement("div");

div.className="status";

div.innerHTML = `
<p>${data.text || ""}</p>
${data.image ? `<img src="${data.image}">` : ""}

<br>

<button onclick="editStatus('${id}','${data.text || ""}')">Edit</button>

<button onclick="deleteStatus('${id}')">Delete</button>
`;

container.appendChild(div);

});

});


window.deleteStatus = function(id){

const deleteRef = ref(db,"status/"+id);

remove(deleteRef);

}


window.editStatus = function(id,oldText){

const newText = prompt("Edit Status",oldText);

if(newText){

const editRef = ref(db,"status/"+id);

update(editRef,{
text:newText
});

}

}

</script>

</body>
</html>
