<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>slides</title>
  <style>
 /* container */

.slide-slider-container{
  position:relative;
  top:20px;
  height:45vh;
  overflow:hidden;
  border-radius:18px;
  background:#111;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* slider */

.slide-slider{
  display:flex;
  height:100%;
  transition:transform .7s cubic-bezier(.77,0,.18,1);
}

/* slide */

.slide-slide{
  min-width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  position:relative;

  opacity:.6;
  transform:scale(1.05);
  transition:all .8s ease;
}

/* active slide */

.slide-slide.active{
  opacity:1;
  transform:scale(1);
}

/* dark gradient overlay */

.slide-slide::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.5),
    rgba(0,0,0,0)
  );
}

/* navigation dots */

.slide-nav{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.slide-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.4);
  cursor:pointer;
  transition:.35s;
}

.slide-dot.active{
  background:#fff;
  transform:scale(1.5);
  box-shadow:0 0 10px rgba(255,255,255,.7);
}

/* buttons */

.slide-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;

  background:rgba(255,255,255,.15);
  backdrop-filter:blur(8px);

  color:white;
  font-size:1rem;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.3s;
}

/* button hover */

.slide-btn:hover{
  background:rgba(255,255,255,.35);
  transform:translateY(-50%) scale(1.1);
}

/* button positions */

.slide-btn.prev{left:14px;}
.slide-btn.next{ right:14px;}
.slide-btn:hover { background: rgba(255,255,255,0.4);}
 .slide-btn:hover { background: rgba(255,255,255,0.4);  }
  
  </style>
</head>
<body>

<section class="slide-section">
  <div class="slide-slider-container">
    <div class="slide-slider" id="slideSlider"></div>
    <button class="slide-btn prev">&#10094;</button>
    <button class="slide-btn next">&#10095;</button>
    <div class="slide-nav" id="slideNav"></div>
  </div>
</section>

<script type="module" src="slide.js"></script>

</body>
</html><!DOCTYPE html>
