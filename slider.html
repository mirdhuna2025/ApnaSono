<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Premium Slider</title>

<style>

body{
margin:0;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:sans-serif;
overflow:hidden;
}

/* slider */

.slider{
width:900px;
height:460px;
position:relative;
perspective:1400px;
}

/* blurred background layer */

.bg-blur{
position:absolute;
inset:0;
z-index:0;
filter:blur(80px);
opacity:.5;
transition:1s;
background-size:cover;
background-position:center;
}

/* carousel */

.carousel{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
transform-style:preserve-3d;
transition:transform 1s cubic-bezier(.77,0,.18,1);
}

/* slides */

.slide{
position:absolute;
width:70%;
height:80%;
border-radius:20px;
overflow:hidden;
box-shadow:0 40px 80px rgba(0,0,0,.6);
transition:1s;
}

/* image */

.slide img{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

/* dynamic light */

.light{
position:absolute;
inset:0;
background:radial-gradient(circle at center,
rgba(255,255,255,.25),
transparent 60%);
mix-blend-mode:overlay;
pointer-events:none;
}

/* buttons */

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:46px;
height:46px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
color:white;
font-size:20px;
cursor:pointer;
z-index:5;
}

.prev{left:-60px}
.next{right:-60px}

.btn:hover{
background:rgba(255,255,255,.4);
}

/* dots */

.dots{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#aaa;
cursor:pointer;
}

.dot.active{
background:white;
transform:scale(1.4);
}

</style>

</head>

<body>

<div class="slider">

<div class="bg-blur" id="bg"></div>

<div class="carousel" id="carousel">

<div class="slide"><img src="https://picsum.photos/id/1015/900/500"></div>
<div class="slide"><img src="https://picsum.photos/id/1016/900/500"></div>
<div class="slide"><img src="https://picsum.photos/id/1018/900/500"></div>
<div class="slide"><img src="https://picsum.photos/id/1020/900/500"></div>
<div class="slide"><img src="https://picsum.photos/id/1024/900/500"></div>

</div>

<button class="btn prev">❮</button> <button class="btn next">❯</button>

<div class="dots" id="dots"></div>

</div>

<script>

const carousel=document.getElementById("carousel")
const slides=[...document.querySelectorAll(".slide")]
const prev=document.querySelector(".prev")
const next=document.querySelector(".next")
const bg=document.getElementById("bg")
const dotsContainer=document.getElementById("dots")

let index=0
let startX=0
let dragging=false

/* create dots */

slides.forEach((_,i)=>{
let d=document.createElement("div")
d.className="dot"
if(i==0)d.classList.add("active")
dotsContainer.appendChild(d)

d.onclick=()=>go(i)
})

const dots=[...document.querySelectorAll(".dot")]

/* arrange slides in 3D */

function render(){

slides.forEach((slide,i)=>{

let offset=i-index

slide.style.transform=
`rotateY(${offset*40}deg) translateZ(380px) translateX(${offset*60}px)`

slide.style.opacity=Math.abs(offset)>2?0:.8
})

bg.style.backgroundImage=
`url(${slides[index].querySelector("img").src})`

dots.forEach(d=>d.classList.remove("active"))
dots[index].classList.add("active")
}

function go(i){

index=(i+slides.length)%slides.length
render()
}

render()

/* buttons */

next.onclick=()=>go(index+1)
prev.onclick=()=>go(index-1)

/* swipe / drag */

carousel.addEventListener("pointerdown",e=>{
dragging=true
startX=e.clientX
})

window.addEventListener("pointerup",e=>{
if(!dragging)return

let diff=e.clientX-startX

if(diff>80)go(index-1)
if(diff<-80)go(index+1)

dragging=false
})

/* dynamic lighting */

slides.forEach(slide=>{

let light=document.createElement("div")
light.className="light"
slide.appendChild(light)

slide.addEventListener("mousemove",e=>{

const rect=slide.getBoundingClientRect()

let x=(e.clientX-rect.left)/rect.width*100
let y=(e.clientY-rect.top)/rect.height*100

light.style.background=
`radial-gradient(circle at ${x}% ${y}%,
rgba(255,255,255,.35),
transparent 60%)`
})

})

</script>

</body>
</html>
