<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>slides</title>
  <style>
    .slide-slider-container {
      position: relative; top: 20px;
      height: 45vh;
      overflow: hidden;
      border-radius: 15px 15px 15px 15px;
      background: #2c3e50;
    }
    .slide-slider {
      display: flex;
      height: 100%;
      transform:scale(0.9);
      transition: opacity 1s ease, transform 1s ease;
    }
    .slide-slide {
      min-width: 100%;
      height: 100%;
      background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
      cursor: pointer;
      opacity: 0.95;
    }
    .slide-slide:hover {
      opacity: 1;
    }
    .slide-nav {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    .slide-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: 0.3s;
    }
    .slide-dot.active {
      background: #fff;
      transform: scale(1.3);
    }
   .slide-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide-btn.prev{
  left: 10px;
}

.slide-btn.next{
  right: 10px;
}

.slide-btn:hover {
  background: rgba(255,255,255,0.4);
}
    
    .slide-btn:hover {
      background: rgba(255,255,255,0.4);
    }
  
  </style>
</head>
<body>

<section class="slide-section">
  <div class="slide-slider-container">
    <div class="slide-slider" id="slideSlider"></div>
    <button class="slide-btn prev">&#10094;</button>
    <button class="slide-btn next">&#10095;</button>
    <div class="slide-nav" id="slideNav"></div>
  </div>
</section>

<script type="module" src="slide.js"></script>

</body>
</html>
