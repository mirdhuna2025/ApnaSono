<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Sticky Bar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Body padding to avoid overlap */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding-bottom: 90px; /* sticky bar height + margin */
      background: white;
    }

    /* Sticky bar container */
    

    /* Button styling */
    .bar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      padding: 10px 16px;
      position: relative;
      transition: transform 0.3s, color 0.3s;
    }

    /* Icon animation */
    .bar-btn i {
      font-size: 22px;
      margin-bottom: 5px;
      transition: transform 0.3s, color 0.3s;
    }

    /* Hover effect */
    .bar-btn:hover {
      color: #fff;
      transform: translateY(-8px) scale(1.1);
    }

    .bar-btn:hover i {
      transform: rotate(15deg) scale(1.3);
      color: #ffd700; /* golden highlight */
    }

    /* Ripple effect on click */
    .bar-btn::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border-radius: 50px;
      background: rgba(255,255,255,0.2);
      opacity: 0;
      transform: scale(0);
      transition: transform 0.4s, opacity 0.4s;
    }

    .bar-btn:active::after {
      transform: scale(1.5);
      opacity: 1;
      transition: 0s;
    }

    /* Text animation */
    .bar-btn span {
      transition: transform 0.3s, color 0.3s;
    }

    /* Optional: subtle float effect for bar */
    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }
    #stickyBar {
      animation: float 4s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Sticky Bar -->
  <nav id="stickyBar">
    <a href="https://apnasono.in/chat" class="bar-btn" id="homeBtn">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="login.html" class="bar-btn" id="loginBtn">
      <i class="fas fa-user-circle"></i>
      <span>Login</span>
    </a>
    <a href="https://apnasono.in/chat" class="bar-btn" id="chatsBtn">
      <i class="fas fa-message"></i>
      <span>Chat</span>
    </a>
    <a href="https://apnasono.in/news1" class="bar-btn" id="newsBtn">
      <i class="fas fa-newspaper"></i>
      <span>News</span>
    </a>
    <a href="/sell" class="bar-btn" id="sellBtn">
      <i class="fas fa-tags"></i>
      <span>Sell</span>
    </a>
  </nav>

</body>
</html>
