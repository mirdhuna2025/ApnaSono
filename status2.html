<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status Stories</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.header{
background:#075e54;
padding:15px;
font-size:20px;
text-align:center;
}

.story-bar{
display:flex;
overflow-x:auto;
padding:15px;
background:#1a1a1a;
}

.story{
margin-right:15px;
text-align:center;
cursor:pointer;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #25D366;
object-fit:cover;
}

.story p{
font-size:12px;
margin-top:5px;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.viewer img,.viewer video{
max-width:95%;
max-height:85%;
}

.progress{
width:90%;
height:4px;
background:#333;
margin-bottom:10px;
}

.bar{
height:4px;
background:#25D366;
width:0%;
}

.upload{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

input{
display:none;
}

</style>
</head>
<body>

<div class="header">Status</div>

<div class="story-bar" id="stories"></div>

<div class="viewer" id="viewer">
<div class="progress"><div class="bar" id="bar"></div></div>
<img id="viewImg">
<video id="viewVideo" controls></video>
</div>

<label class="upload">
+
<input type="file" id="uploadFile">
</label>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain: "mirdhuna-25542.firebaseapp.com",
databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId: "mirdhuna-25542",
storageBucket: "mirdhuna-25542.firebasestorage.app",
messagingSenderId: "575924409876",
appId: "1:575924409876:web:6ba1ed88ce941d9c83b901",
measurementId: "G-YB7LDKHBPV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const upload = document.getElementById("uploadFile");
const storiesDiv = document.getElementById("stories");

upload.addEventListener("change", async () => {

const file = upload.files[0];

const storageRef = sRef(storage,"status/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

const url = await getDownloadURL(storageRef);

push(ref(db,"status"),{

url:url,
type:file.type,
time:Date.now()

});

});

onValue(ref(db,"status"),snapshot=>{

storiesDiv.innerHTML="";

snapshot.forEach(data=>{

const status = data.val();

if(Date.now()-status.time > 86400000){

remove(ref(db,"status/"+data.key));
return;

}

const div=document.createElement("div");
div.className="story";

const img=document.createElement("img");

img.src=status.url;

const name=document.createElement("p");
name.innerText="Status";

div.appendChild(img);
div.appendChild(name);

div.onclick=()=>openViewer(status);

storiesDiv.appendChild(div);

});

});

function openViewer(status){

const viewer=document.getElementById("viewer");
const img=document.getElementById("viewImg");
const video=document.getElementById("viewVideo");
const bar=document.getElementById("bar");

viewer.style.display="flex";

bar.style.width="0%";

let progress=0;

const interval=setInterval(()=>{

progress+=2;
bar.style.width=progress+"%";

if(progress>=100){

clearInterval(interval);
viewer.style.display="none";

}

},100);

if(status.type.startsWith("image")){

img.style.display="block";
video.style.display="none";
img.src=status.url;

}else{

video.style.display="block";
img.style.display="none";
video.src=status.url;

}

}

</script>

</body>
</html>
