<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Slider Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .admin-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        /* Upload Area */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #eef0ff;
            border-color: #764ba2;
            transform: translateY(-2px);
        }

        .upload-area i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 0.9rem;
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .image-info {
            padding: 15px;
        }

        .image-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .image-date {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .image-actions {
            display: flex;
            gap: 10px;
        }

        /* Loading & Messages */
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2rem;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Offer Slider Admin Panel</h1>
        
        <div class="admin-panel">
            <!-- Messages -->
            <div id="message" class="message"></div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalImages">0</div>
                    <div class="stat-label">Total Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="storageUsed">0 MB</div>
                    <div class="stat-label">Storage Used</div>
                </div>
            </div>

            <!-- Upload Section -->
            <div class="section">
                <h2 class="section-title">📤 Upload Images</h2>
                <div class="upload-area" id="uploadArea">
                    <div style="font-size: 3rem; margin-bottom: 15px;">📁</div>
                    <p><strong>Click to upload</strong> or drag and drop</p>
                    <p style="font-size: 0.9rem; color: #999;">Supports: JPG, PNG, GIF, WebP (Max 10MB each)</p>
                    <input type="file" id="fileInput" multiple accept="image/*">
                    <button class="btn" onclick="document.getElementById('fileInput').click()">
                        Choose Files
                    </button>
                </div>
                <div id="uploadProgress" style="margin-top: 20px; display: none;">
                    <p>Uploading... <span id="uploadCount">0</span> files</p>
                    <div style="background: #e0e0e0; border-radius: 10px; height: 20px; overflow: hidden; margin-top: 10px;">
                        <div id="progressBar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s;"></div>
                    </div>
                </div>
            </div>

            <!-- Current Images Section -->
            <div class="section">
                <h2 class="section-title">🖼️ Current Slider Images</h2>
                <div id="imagesContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading images...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getStorage, ref, uploadBytes, listAll, deleteObject, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { getConfig } from "./config.js";

        // Initialize Firebase
        const firebaseConfig = getConfig().firebase;
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imagesContainer = document.getElementById('imagesContainer');
        const message = document.getElementById('message');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const uploadCount = document.getElementById('uploadCount');
        const totalImagesEl = document.getElementById('totalImages');
        const storageUsedEl = document.getElementById('storageUsed');

        let currentImages = [];

        // Show message
        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            setTimeout(() => {
                message.className = 'message';
            }, 5000);
        }

        // Load images from Firebase Storage
        async function loadImages() {
            try {
                const folderRef = ref(storage, 'offerslide/');
                const result = await listAll(folderRef);
                
                currentImages = result.items;
                
                // Update stats
                totalImagesEl.textContent = currentImages.length;
                const totalSize = currentImages.reduce((acc, img) => acc + (img.size || 0), 0);
                storageUsedEl.textContent = (totalSize / (1024 * 1024)).toFixed(2) + ' MB';
                
                displayImages();
            } catch (error) {
                console.error('Error loading images:', error);
                showMessage('Error loading images: ' + error.message, 'error');
            }
        }

        // Display images in grid
        function displayImages() {
            if (currentImages.length === 0) {
                imagesContainer.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;">️</div>
                        <h3>No images uploaded yet</h3>
                        <p>Upload your first image to get started!</p>
                    </div>
                `;
                return;
            }

            imagesContainer.innerHTML = `
                <div class="image-grid">
                    ${currentImages.map((img, index) => `
                        <div class="image-card" data-name="${img.name}">
                            <img src="${img.fullPath}" alt="${img.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22200%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'">
                            <div class="image-info">
                                <div class="image-name">${img.name}</div>
                                <div class="image-date">Order: ${index + 1}</div>
                                <div class="image-actions">
                                    <button class="btn btn-small btn-danger" onclick="deleteImage('${img.name}')">
                                        🗑️ Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Load actual image URLs
            currentImages.forEach((img, index) => {
                getDownloadURL(img).then(url => {
                    const imgElement = document.querySelector(`.image-card[data-name="${img.name}"] img`);
                    if (imgElement) {
                        imgElement.src = url;
                    }
                }).catch(err => {
                    console.error('Error getting download URL:', err);
                });
            });
        }

        // Upload files
        async function uploadFiles(files) {
            if (files.length === 0) return;

            uploadProgress.style.display = 'block';
            uploadCount.textContent = `0/${files.length}`;
            
            let uploaded = 0;
            const validFiles = Array.from(files).filter(file => {
                if (!file.type.startsWith('image/')) {
                    showMessage(`${file.name} is not an image file`, 'error');
                    return false;
                }
                if (file.size > 10 * 1024 * 1024) {
                    showMessage(`${file.name} exceeds 10MB limit`, 'error');
                    return false;
                }
                return true;
            });

            for (let i = 0; i < validFiles.length; i++) {
                const file = validFiles[i];
                const timestamp = Date.now();
                const uniqueName = `${timestamp}_${file.name.replace(/\s+/g, '_')}`;
                const storageRef = ref(storage, `offerslide/${uniqueName}`);

                try {
                    await uploadBytes(storageRef, file);
                    uploaded++;
                    uploadCount.textContent = `${uploaded}/${validFiles.length}`;
                    progressBar.style.width = `${(uploaded / validFiles.length) * 100}%`;
                } catch (error) {
                    console.error('Upload error:', error);
                    showMessage(`Error uploading ${file.name}: ${error.message}`, 'error');
                }
            }

            uploadProgress.style.display = 'none';
            progressBar.style.width = '0%';
            
            if (uploaded > 0) {
                showMessage(`Successfully uploaded ${uploaded} image(s)!`, 'success');
                await loadImages();
            }
        }

        // Delete image
        window.deleteImage = async function(imageName) {
            if (!confirm(`Are you sure you want to delete "${imageName}"?`)) {
                return;
            }

            try {
                const imageRef = ref(storage, `offerslide/${imageName}`);
                await deleteObject(imageRef);
                showMessage(`Deleted "${imageName}" successfully!`, 'success');
                await loadImages();
            } catch (error) {
                console.error('Delete error:', error);
                showMessage('Error deleting image: ' + error.message, 'error');
            }
        };

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            uploadFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            uploadFiles(e.target.files);
            fileInput.value = ''; // Reset input
        });

        // Initial load
        loadImages();
    </script>
</body>
</html>
