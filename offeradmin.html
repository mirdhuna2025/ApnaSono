<!DOCTYPE html>
<html>
<head>
<title>Offer Banner Upload</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

.progress{
margin-top:10px;
font-size:14px;
color:green;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.preview img{
width:100px;
height:70px;
object-fit:cover;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Upload Offer Banners</h2>

<h3>Single Image Upload</h3>
<input type="file" id="singleUpload" accept="image/*">
<br>
<button onclick="uploadSingle()">Upload Banner</button>

<hr>

<h3>Bulk Upload (Folder)</h3>
<input type="file" id="folderUpload" webkitdirectory multiple>
<br>
<button onclick="uploadFolder()">Upload Folder Images</button>

<div class="progress" id="progress"></div>

<div class="preview" id="preview"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
