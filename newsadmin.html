<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 14px;
border:none;
border-radius:4px;
cursor:pointer;
}

.post-btn{
background:#25D366;
color:white;
}

.delete-btn{
background:#f44336;
color:white;
}

.save-btn{
background:#2196F3;
color:white;
}

.news-card{
background:white;
padding:15px;
margin-bottom:10px;
border-left:5px solid #25D366;
border-radius:6px;
}

.news-media{
margin-top:10px;
   height: 200px;
}

.news-media video {
   max-width: 30%;
   max-height: 100%;
  border-radius:6px;
}


.news-media img{
max-width:24%;
border-radius:6px;
}

.news-media audio{
width:100%;
margin-top:8px;
}

.news-date{
font-size:12px;
color:#888;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="container">

<!-- CREATE NEWS -->
<div class="card">

<h2>📰 Create News</h2>

<input id="title" placeholder="News Title">

<textarea id="description" placeholder="News Description"></textarea>

<input type="file" id="media">

<div id="preview"></div>

<button class="post-btn" onclick="createNews()">Publish News</button>

<p id="msg"></p>

</div>


<!-- CURRENT NEWS -->
<div class="card">

<h2>📋 Current Posted News</h2>

<div id="newsList">Loading...</div>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain:"mirdhuna-25542.firebaseapp.com",
databaseURL:"https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId:"mirdhuna-25542",
storageBucket:"mirdhuna-25542.firebasestorage.app",
messagingSenderId:"575924409876",
appId:"1:575924409876:web:6ba1ed88ce941d9c83b901"
};

firebase.initializeApp(firebaseConfig);

const fileInput=document.getElementById("media");
const preview=document.getElementById("preview");

let file=null;

fileInput.addEventListener("change",()=>{

file=fileInput.files[0];
preview.innerHTML="";

if(!file) return;

if(file.type.startsWith("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(file)}" width="200">`;
}

else if(file.type.startsWith("video")){
preview.innerHTML=`<video controls width="250" src="${URL.createObjectURL(file)}"></video>`;
}

else if(file.type.startsWith("audio")){
preview.innerHTML=`<audio controls src="${URL.createObjectURL(file)}"></audio>`;
}

});

async function createNews(){

const title=document.getElementById("title").value.trim();
const description=document.getElementById("description").value.trim();

if(!title || !description){
alert("Fill all fields");
return;
}

let mediaUrl="";
let mediaType="";

if(file){

const storageRef=firebase.storage().ref("newsMedia/"+Date.now()+"_"+file.name);

await storageRef.put(file);

mediaUrl=await storageRef.getDownloadURL();

if(file.type.startsWith("image")) mediaType="image";
if(file.type.startsWith("video")) mediaType="video";
if(file.type.startsWith("audio")) mediaType="audio";

}

await firebase.database().ref("news").push({

title,
description,
mediaUrl,
mediaType,
timestamp:Date.now()

});

document.getElementById("msg").innerText="✅ News Published";

document.getElementById("title").value="";
document.getElementById("description").value="";
fileInput.value="";
preview.innerHTML="";
file=null;

}

const newsList=document.getElementById("newsList");

function loadNews(){

firebase.database().ref("news").on("value",(snapshot)=>{

if(!snapshot.exists()){
newsList.innerHTML="No news posted";
return;
}

const data=snapshot.val();

const items=Object.entries(data)
.map(([key,item])=>({...item,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));

newsList.innerHTML="";

items.forEach(item=>{

const date=new Date(item.timestamp).toLocaleString();

let mediaHTML="";

if(item.mediaType==="image"){
mediaHTML=`<img src="${item.mediaUrl}">`;
}

if(item.mediaType==="video"){
mediaHTML=`<video controls src="${item.mediaUrl}"></video>`;
}

if(item.mediaType==="audio"){
mediaHTML=`<audio controls src="${item.mediaUrl}"></audio>`;
}

const div=document.createElement("div");

div.className="news-card";

div.innerHTML=`

<div class="news-date">${date}</div>

<input id="title-${item.key}" value="${item.title}">

<textarea id="desc-${item.key}">${item.description}</textarea>

<div class="news-media">${mediaHTML}</div>

<button class="save-btn" onclick="updateNews('${item.key}')">Save</button>

<button class="delete-btn" onclick="deleteNews('${item.key}')">Delete</button>

`;

newsList.appendChild(div);

});

});

}

function updateNews(id){

const title=document.getElementById("title-"+id).value;
const description=document.getElementById("desc-"+id).value;

firebase.database().ref("news/"+id).update({

title,
description

});

alert("News Updated");

}

function deleteNews(id){

if(!confirm("Delete this news?")) return;

firebase.database().ref("news/"+id).remove();

}

loadNews();

</script>

</body>
</html>
