<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News Admin</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:6px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1da851;
}

</style>

</head>

<body>

<div class="container">

<h2>📰 Post News</h2>

<input type="text" id="title" placeholder="News Title">

<textarea id="description" placeholder="News Description"></textarea>

<button onclick="postNews()">Publish News</button>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain:"mirdhuna-25542.firebaseapp.com",
databaseURL:"https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId:"mirdhuna-25542",
storageBucket:"mirdhuna-25542.firebasestorage.app",
messagingSenderId:"575924409876",
appId:"1:575924409876:web:6ba1ed88ce941d9c83b901"
};

firebase.initializeApp(firebaseConfig);

function postNews(){

const title=document.getElementById("title").value.trim();
const description=document.getElementById("description").value.trim();

if(!title || !description){
alert("Please fill all fields");
return;
}

firebase.database().ref("news").push({

title:title,
description:description,
timestamp:Date.now()

}).then(()=>{

document.getElementById("msg").innerText="✅ News Posted";

document.getElementById("title").value="";
document.getElementById("description").value="";

});

}

</script>

</body>
</html>
