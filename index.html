<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirdhuna</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #FFFFE0;
    }

  .news-preview{
  max-height:80px;
  overflow:hidden;
  padding:10px;
  background:white;
  margin:10px;
  border-radius:8px;
}


    
    div {
      width: 100%;
    }
    
    
  </style>
</head>
<body>

  <!-- Header -->
  <div data-html="headerlogo.html"></div>

  <!-- Weather -->
  <div data-html="weather.html"></div>

  <!-- Slider -->
  <div data-html="slider.html"></div>
  <div data-html="news.html"></div>
  <!-- Offer -->

  <!-- Sticky Bar -->
  <div data-html="stickybar.html"></div>

  <script>
    async function loadSection(div) {
      const file = div.dataset.html;
      const useJs = div.dataset.js !== "false";

      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`${file} not found`);
        
        const html = await res.text();
        const temp = document.createElement("div");
        temp.innerHTML = html;

        // Move styles to head
        temp.querySelectorAll("style").forEach(style => document.head.appendChild(style));

        // Insert content excluding style tags
        div.innerHTML = temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi, '');

        // Load associated JS module if enabled
        if (useJs) {
          const jsFile = file.replace(".html", ".js");
          const response = await fetch(jsFile);
          if (response.ok) {
            const script = document.createElement("script");
            script.type = "module";
            script.src = jsFile;
            document.body.appendChild(script);
          }
        }
      } catch (error) {
        console.error(`Error loading section: ${file}`, error);
        div.innerHTML = "<p style='color:red;text-align:center;padding:10px;'>Error loading content. Please try again later.</p>";
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("[data-html]").forEach(loadSection);
    });
  </script>

</body>
</html>
