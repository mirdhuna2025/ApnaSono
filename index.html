/* ===========================
HELPER: Detect media type from URL
Firebase Storage URLs have extensions INSIDE the path, not at the end
Example: https://firebasestorage.googleapis.com/v0/b/bucket/o/images%2Fphoto.jpg?alt=media&token=xxx
=========================== */

function getMediaType(url) {
if (!url) return null;
  
// Decode URL to check for extensions (Firebase encodes paths)
const decodedUrl = decodeURIComponent(url).toLowerCase();
  
// Check for image extensions
if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i.test(decodedUrl)) {
return 'image';
}
  
// Check for video extensions
if (/\.(mp4|webm|ogg|mov|avi)(\?|$)/i.test(decodedUrl)) {
return 'video';
}
  
// Check for audio extensions
if (/\.(mp3|wav|aac|ogg|m4a|flac)(\?|$)/i.test(decodedUrl)) {
return 'audio';
}
  
// Check content type hints in URL if present
if (url.includes('image') || url.includes('photo') || url.includes('img')) {
return 'image';
}
  
if (url.includes('video') || url.includes('vid')) {
return 'video';
}
  
if (url.includes('audio') || url.includes('voice') || url.includes('recording')) {
return 'audio';
}
  
return null;
}


/* ===========================
CHAT LOADER (FIXED MEDIA SUPPORT)
=========================== */

function loadChatMessages(){

const chatContainer=document.getElementById("chat-container");

chatContainer.innerHTML='<p style="text-align:center;color:#999;">Loading messages...</p>';

firebase.database().ref("messages").once("value")
.then((snapshot)=>{

if(!snapshot.exists()){
chatContainer.innerHTML='<p style="text-align:center;color:#999;">No messages yet</p>';
return;
}

const messagesObj=snapshot.val();

const messages=Object.entries(messagesObj)
.map(([key,msg])=>({...msg,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,5)
.reverse();

chatContainer.innerHTML="";

messages.forEach((msg)=>{

const div=document.createElement("div");
div.className="chat-item";

let contentHTML=`<strong>${msg.user||"User"}:</strong> `;

/* Get media URL from any possible field */
const mediaUrl=
msg.imageUrl||
msg.videoUrl||
msg.audioUrl||
msg.mediaUrl||
msg.fileUrl||
msg.image||
msg.video||
msg.audio||
msg.media||
msg.file||
null;

/* Detect media type using helper function */
const mediaType = getMediaType(mediaUrl);

/* IMAGE */
if(mediaType === 'image'){
contentHTML+=`
<div class="chat-media-container">
<img src="${mediaUrl}"
alt="Chat image"
onclick="window.open('${mediaUrl}', '_blank')"
onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
<span style="display:none;color:#999;font-size:12px;">📷 Image failed to load</span>
</div>
`;
}

/* VIDEO */
else if(mediaType === 'video'){
contentHTML+=`
<div class="chat-media-container">
<video controls preload="metadata">
<source src="${mediaUrl}">
Your browser does not support video playback.
</video>
</div>
`;
}

/* AUDIO */
else if(mediaType === 'audio'){
contentHTML+=`
<div class="chat-media-container">
<audio controls preload="metadata">
<source src="${mediaUrl}">
Your browser does not support audio playback.
</audio>
</div>
`;
}

/* UNKNOWN MEDIA - Show as link */
else if(mediaUrl && !mediaType){
contentHTML+=`
<div class="chat-media-container">
<a href="${mediaUrl}" target="_blank" style="color:#25D366;">📎 View Attachment</a>
</div>
`;
}

/* TEXT MESSAGE */
if(msg.text){
contentHTML+=`
<div style="margin-top:5px;font-size:12px;">
${msg.text.substring(0,150)}
${msg.text.length>150?'...':''}
</div>
`;
}

/* No content at all */
if(!msg.text && !mediaUrl){
contentHTML+="<span style='color:#999;'>(Empty message)</span>";
}

div.innerHTML=contentHTML;

chatContainer.appendChild(div);

});

})
.catch((error)=>{
console.error("Chat error:",error);
chatContainer.innerHTML='<p style="text-align:center;color:red;">Error loading messages</p>';
});

}



/* ===========================
LISTINGS
=========================== */

function loadListings(){

const sellContainer=document.getElementById("sell-container");

sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">Loading listings...</p>';

const storageRef=firebase.storage().ref("listings");

storageRef.listAll()
.then((res)=>{

if(res.prefixes.length===0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

const promises=res.prefixes.map((folderRef)=>{
return folderRef.child("data.json")
.getDownloadURL()
.then((url)=>fetch(url).then((r)=>r.json()))
.catch(()=>null);
});

Promise.all(promises)
.then((items)=>{

const validItems=items
.filter(Boolean)
.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
.slice(0,4);

if(validItems.length === 0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

sellContainer.innerHTML="";

validItems.forEach((item)=>{

const card=document.createElement("div");
card.className="sell-item-card";

const imgSrc=item.images?.[0]||"https://via.placeholder.com/150?text=No+Image";

card.innerHTML=`

<img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">

<div style="font-weight:bold;">${item.title||"Item"}</div>

<div style="color:#25D366;font-weight:bold;">₹${item.price||"N/A"}</div>

<div style="font-size:11px;color:#666;">📍 ${item.location||"Unknown"}</div>

`;

sellContainer.appendChild(card);

});

});

})
.catch((error)=>{
console.error("Listings error:",error);
sellContainer.innerHTML='<p style="text-align:center;color:red;grid-column:1/-1;">Error loading listings</p>';
});

}

/* ===========================
LOAD PAGE SECTIONS
=========================== */

async function loadSection(divElement){

const file=divElement.dataset.html;
const useJs=divElement.dataset.js!=="false";

try{

const res=await fetch(file);
const html=await res.text();

const temp=document.createElement("div");
temp.innerHTML=html;

temp.querySelectorAll("style").forEach(style=>document.head.appendChild(style));

divElement.innerHTML=temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi,'');

if(useJs){

const jsFile=file.replace(".html",".js");

const response=await fetch(jsFile);

if(response.ok){

const script=document.createElement("script");
script.type="module";
script.src=jsFile;

document.body.appendChild(script);

}

}

}catch(error){

console.error(`Error loading ${file}:`,error);

}

}
