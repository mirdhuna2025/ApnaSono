<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#FFFFE0;
}

div{width:100%;}

.container-section{
max-width:1200px;
margin:20px auto;
padding:0 10px;
background:white;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.container-title{
font-size:24px;
font-weight:bold;
padding:15px;
color:#333;
border-bottom:2px solid #25D366;
}

.container-content{
padding:15px;
min-height:300px;
}

#chat-container{
max-height:500px;
overflow-y:auto;
}

.chat-item{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.chat-item:last-child{
border-bottom:none;
}

#sell-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.sell-item-card{
background:#f9f9f9;
border-radius:6px;
padding:10px;
text-align:center;
font-size:12px;
border:1px solid #ddd;
}

.sell-item-card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:4px;
margin-bottom:5px;
}

#news-container{
display:flex;
flex-direction:column;
gap:10px;
}

.news-item{
padding:12px;
background:#f5f5f5;
border-left:4px solid #25D366;
border-radius:4px;
font-size:14px;
}

.news-item-title{
font-weight:bold;
margin-bottom:5px;
color:#222;
}

.news-item-desc{
color:#666;
font-size:12px;
}

.view-all-link{
text-align:right;
padding:10px 15px;
border-top:1px solid #eee;
}

.view-all-link a{
color:#25D366;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.view-all-link a:hover{
text-decoration:underline;
}

/* ===========================
CHAT LOADER (UPDATED MEDIA SUPPORT)
=========================== */

function loadChatMessages(){

const chatContainer=document.getElementById("chat-container");

chatContainer.innerHTML='<p style="text-align:center;color:#999;">Loading messages...</p>';

firebase.database().ref("messages").once("value",(snapshot)=>{

if(!snapshot.exists()){
chatContainer.innerHTML='<p style="text-align:center;color:#999;">No messages yet</p>';
return;
}

const messagesObj=snapshot.val();

const messages=Object.entries(messagesObj)
.map(([key,msg])=>({...msg,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,5)
.reverse();

chatContainer.innerHTML="";

messages.forEach((msg)=>{

const div=document.createElement("div");
div.className="chat-item";

let contentHTML=`<strong>${msg.user||"User"}:</strong> `;

/* detect any media field */

const mediaUrl=
msg.imageUrl||
msg.videoUrl||
msg.audioUrl||
msg.mediaUrl||
msg.fileUrl||
null;

/* IMAGE */

if(mediaUrl && mediaUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)){

contentHTML+=`
<div style="margin-top:8px;">
<img src="${mediaUrl}"
style="max-width:150px;max-height:150px;border-radius:4px;object-fit:cover;"
onerror="this.src='https://via.placeholder.com/150?text=Image'">
</div>
`;

}

/* VIDEO */

else if(mediaUrl && mediaUrl.match(/\.(mp4|webm|ogg)$/i)){

contentHTML+=`
<div style="margin-top:8px;">
<video controls style="max-width:150px;border-radius:4px;">
<source src="${mediaUrl}">
</video>
</div>
`;

}

/* AUDIO */

else if(mediaUrl && mediaUrl.match(/\.(mp3|wav|aac)$/i)){

contentHTML+=`
<div style="margin-top:8px;">
<audio controls>
<source src="${mediaUrl}">
</audio>
</div>
`;

}

/* TEXT MESSAGE */

if(msg.text){

contentHTML+=`
<div style="margin-top:5px;font-size:12px;">
${msg.text.substring(0,150)}
${msg.text.length>150?'...':''}
</div>
`;

}

if(!msg.text && !mediaUrl){
contentHTML+="(Media)";
}

div.innerHTML=contentHTML;

chatContainer.appendChild(div);

});

}).catch((error)=>{

console.error("Chat error:",error);

chatContainer.innerHTML='<p style="text-align:center;color:red;">Error loading messages</p>';

});

}



/* ===========================
LISTINGS
=========================== */

function loadListings(){

const sellContainer=document.getElementById("sell-container");

sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">Loading listings...</p>';

const storageRef=firebase.storage().ref("listings");

storageRef.listAll()
.then((res)=>{

if(res.prefixes.length===0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

const promises=res.prefixes.map((folderRef)=>{
return folderRef.child("data.json")
.getDownloadURL()
.then((url)=>fetch(url).then((r)=>r.json()))
.catch(()=>null);
});

Promise.all(promises)
.then((items)=>{

const validItems=items
.filter(Boolean)
.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
.slice(0,5);

sellContainer.innerHTML="";

validItems.forEach((item)=>{

const card=document.createElement("div");
card.className="sell-item-card";

const imgSrc=item.images?.[0]||"https://via.placeholder.com/150?text=No+Image";

card.innerHTML=`

<img src="${imgSrc}">

<div style="font-weight:bold;">${item.title||"Item"}</div>

<div style="color:#25D366;font-weight:bold;">₹${item.price||"N/A"}</div>

<div style="font-size:11px;color:#666;">📍 ${item.location||"Unknown"}</div>

`;

sellContainer.appendChild(card);

});

});

});

}



/* ===========================
NEWS
=========================== */

function loadNews(){

const newsContainer=document.getElementById("news-container");

newsContainer.innerHTML='<p style="text-align:center;color:#999;">Loading news...</p>';

firebase.database().ref("news").once("value",(snapshot)=>{

if(snapshot.exists()){

const newsObj=snapshot.val();

const newsItems=Object.entries(newsObj)
.map(([key,item])=>({...item,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,5);

newsContainer.innerHTML="";

newsItems.forEach((item)=>{

const div=document.createElement("div");

div.className="news-item";

div.innerHTML=`
<div class="news-item-title">${item.title}</div>
<div class="news-item-desc">${item.description||""}</div>
`;

newsContainer.appendChild(div);

});

}

});

}



/* ===========================
LOAD PAGE SECTIONS
=========================== */

async function loadSection(divElement){

const file=divElement.dataset.html;
const useJs=divElement.dataset.js!=="false";

try{

const res=await fetch(file);
const html=await res.text();

const temp=document.createElement("div");
temp.innerHTML=html;

temp.querySelectorAll("style").forEach(style=>document.head.appendChild(style));

divElement.innerHTML=temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi,'');

if(useJs){

const jsFile=file.replace(".html",".js");

const response=await fetch(jsFile);

if(response.ok){

const script=document.createElement("script");
script.type="module";
script.src=jsFile;

document.body.appendChild(script);

}

}

}catch(error){

console.error(`Error loading ${file}:`,error);

}

}



/* ===========================
INIT
=========================== */

document.addEventListener("DOMContentLoaded",()=>{

document.querySelectorAll("[data-html]").forEach(loadSection);

setTimeout(()=>{

loadChatMessages();
loadListings();
loadNews();

},1500);

});

</script>
