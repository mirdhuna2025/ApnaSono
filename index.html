/* ===========================
HELPER: Detect media type from URL
Firebase Storage URLs have extensions INSIDE the path, not at the end
Example: https://firebasestorage.googleapis.com/v0/b/bucket/o/images%2Fphoto.jpg?alt=media&token=xxx
=========================== */

function getMediaType(url) {
if (!url) return null;
  
// Decode URL to check for extensions (Firebase encodes paths)
const decodedUrl = decodeURIComponent(url).toLowerCase();
  
// Check for image extensions
if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i.test(decodedUrl)) {
return 'image';
}
  
// Check for video extensions
if (/\.(mp4|webm|ogg|mov|avi)(\?|$)/i.test(decodedUrl)) {
return 'video';
}
  
// Check for audio extensions
if (/\.(mp3|wav|aac|ogg|m4a|flac)(\?|$)/i.test(decodedUrl)) {
return 'audio';
}
  
// Check content type hints in URL if present
if (url.includes('image') || url.includes('photo') || url.includes('img')) {
return 'image';
}
  
if (url.includes('video') || url.includes('vid')) {
return 'video';
}
  
if (url.includes('audio') || url.includes('voice') || url.includes('recording')) {
return 'audio';
}
  
return null;
}


/* ===========================
CHAT LOADER (FIXED MEDIA SUPPORT)
=========================== */
function loadChatMessages(){
const chatContainer=document.getElementById("chat-container");
chatContainer.innerHTML='<p style="text-align:center;color:#999;">Loading messages...</p>';

firebase.database().ref("messages").once("value")
.then(snapshot=>{
if(!snapshot.exists()){chatContainer.innerHTML='<p style="text-align:center;color:#999;">No messages yet</p>'; return;}
const messages=Object.entries(snapshot.val())
.map(([key,msg])=>({...msg,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,10)


chatContainer.innerHTML="";
messages.forEach(msg=>{
const div=document.createElement("div");
div.className="message";

/* MEDIA */
const mediaUrl=msg.imageUrl||msg.videoUrl||msg.audioUrl||msg.mediaUrl||msg.fileUrl||null;
const mediaType=getMediaType(mediaUrl);

let mediaHTML='';
if(mediaType==='image') mediaHTML=`<img class="media-content" src="${mediaUrl}" onclick="window.open('${mediaUrl}','_blank')">`;
else if(mediaType==='video') mediaHTML=`<video class="media-content" controls><source src="${mediaUrl}">Your browser does not support video</video>`;
else if(mediaType==='audio') mediaHTML=`<audio class="media-content" controls><source src="${mediaUrl}">Your browser does not support audio</audio>`;
else if(mediaUrl) mediaHTML=`<a href="${mediaUrl}" target="_blank" style="color:#25D366;">📎 View Attachment</a>`;

/* MESSAGE HTML */
div.innerHTML=`
<div class="header">
<img class="profile" src="${msg.photo || 'https://api.dicebear.com/7.x/thumbs/svg?seed='+(msg.user||'user')}">
<div>
<div class="name-line">${msg.user||'User'}</div>
<div class="meta">${new Date(msg.timestamp||Date.now()).toLocaleString()}</div>
</div>
</div>
<div class="content">${msg.text||''}</div>
${mediaHTML}
<div class="actions">
<button class="reply-btn" onclick="replyMessage('${msg.key}')">💬 </button>
<button class="like-btn" onclick="likeMessage('${msg.key}')">👍 ${msg.likes||0}</button>
<button class="dislike-btn" onclick="dislikeMessage('${msg.key}')">👎 ${msg.dislikes||0}</button>
</div>
`;
chatContainer.appendChild(div);
});
})
.catch(err=>{console.error(err); chatContainer.innerHTML='<p style="text-align:center;color:red;">Error loading messages</p>';});
}


/* ===========================
LISTINGS
=========================== */

function loadListings(){

const sellContainer=document.getElementById("sell-container");

sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">Loading listings...</p>';

const storageRef=firebase.storage().ref("listings");

storageRef.listAll()
.then((res)=>{

if(res.prefixes.length===0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

const promises=res.prefixes.map((folderRef)=>{
return folderRef.child("data.json")
.getDownloadURL()
.then((url)=>fetch(url).then((r)=>r.json()))
.catch(()=>null);
});

Promise.all(promises)
.then((items)=>{

const validItems=items
.filter(Boolean)
.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
.slice(0,4);

if(validItems.length === 0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

sellContainer.innerHTML="";

validItems.forEach((item)=>{

const card=document.createElement("div");
card.className="sell-item-card";

const imgSrc=item.images?.[0]||"https://via.placeholder.com/150?text=No+Image";

card.innerHTML=`

<img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">

<div class="sell-title">${item.title||"Item"}</div>

<div class="sell-price">₹${item.price||"N/A"}</div>

<div class="sell-location">📍 ${item.location||"Unknown"}</div>

`;


sellContainer.appendChild(card);

});

});

})
.catch((error)=>{
console.error("Listings error:",error);
sellContainer.innerHTML='<p style="text-align:center;color:red;grid-column:1/-1;">Error loading listings</p>';
});

}



/* ===========================
NEWS (FIXED)
=========================== */

function loadNews(){

const newsContainer=document.getElementById("news-container");

newsContainer.innerHTML='<p style="text-align:center;color:#999;">Loading news...</p>';

firebase.database().ref("news").once("value")
.then((snapshot)=>{

if(!snapshot.exists()){
newsContainer.innerHTML='<p style="text-align:center;color:#999;">No news yet</p>';
return;
}

const newsObj=snapshot.val();

const newsItems=Object.entries(newsObj)
.map(([key,item])=>({...item,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,5);

if(newsItems.length === 0){
newsContainer.innerHTML='<p style="text-align:center;color:#999;">No news yet</p>';
return;
}

newsContainer.innerHTML="";

newsItems.forEach((item)=>{

const div=document.createElement("div");
div.className="news-item";

div.innerHTML=`
<div class="news-item-title">${item.title || 'Untitled'}</div>
<div class="news-item-desc">${item.description || item.content || ''}</div>
`;

newsContainer.appendChild(div);

});

})
.catch((error)=>{
console.error("News error:",error);
newsContainer.innerHTML='<p style="text-align:center;color:red;">Error loading news</p>';
});

}

/* ===========================
LOAD PAGE SECTIONS
=========================== */

async function loadSection(divElement){

const file=divElement.dataset.html;
const useJs=divElement.dataset.js!=="false";

try{

const res=await fetch(file);
const html=await res.text();

const temp=document.createElement("div");
temp.innerHTML=html;

temp.querySelectorAll("style").forEach(style=>document.head.appendChild(style));

divElement.innerHTML=temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi,'');

if(useJs){

const jsFile=file.replace(".html",".js");

const response=await fetch(jsFile);

if(response.ok){

const script=document.createElement("script");
script.type="module";
script.src=jsFile;

document.body.appendChild(script);

}

}

}catch(error){

console.error(`Error loading ${file}:`,error);

}

}
