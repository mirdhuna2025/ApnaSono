<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirdhuna</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #FFFFE0;
    }

    div {width: 100%;}

    /* Container Styling */
    .container-section {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .container-title {
      font-size: 24px;
      font-weight: bold;
      padding: 15px;
      color: #333;
      border-bottom: 2px solid #25D366;
    }

    .container-content {
      padding: 15px;
      min-height: 300px;
    }

    /* Chat Container */
    #chat-container {
      max-height: 500px;
      overflow-y: auto;
    }

    .chat-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .chat-item:last-child {
      border-bottom: none;
    }

    /* Sell/Listings Container */
    #sell-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .sell-item-card {
      background: #f9f9f9;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      border: 1px solid #ddd;
    }

    .sell-item-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 5px;
    }

    /* News Container */
    #news-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .news-item {
      padding: 12px;
      background: #f5f5f5;
      border-left: 4px solid #25D366;
      border-radius: 4px;
      font-size: 14px;
    }

    .news-item-title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #222;
    }

    .news-item-desc {
      color: #666;
      font-size: 12px;
    }

    /* View All Link */
    .view-all-link {
      text-align: right;
      padding: 10px 15px;
      border-top: 1px solid #eee;
    }

    .view-all-link a {
      color: #25D366;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .view-all-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div data-html="headerlogo.html"></div>
  <div data-html="weather.html"></div>
  <div data-html="slider.html"></div>

  <div data-html="stickybar.html"></div>

  <!-- Chat Container (Last 5 Messages) -->
  <div class="container-section">
    <div class="container-title">💬 Latest Chat</div>
    <div class="container-content">
      <div id="chat-container"></div>
      <div class="view-all-link">
        <a href="chat.html">View All Chat →</a>
      </div>
    </div>
  </div>

  <!-- Sell/Listings Container (First 5 Items) -->
  <div class="container-section">
    <div class="container-title">🛒 Latest Listings</div>
    <div class="container-content">
      <div id="sell-container"></div>
      <div class="view-all-link">
        <a href="sell.html">View All Listings →</a>
      </div>
    </div>
  </div>

  <!-- News Container (First 5 News) -->
  <div class="container-section">
    <div class="container-title">📰 Latest News</div>
    <div class="container-content">
      <div id="news-container"></div>
      <div class="view-all-link">
        <a href="news.html">View All News →</a>
      </div>
    </div>
  </div>

  <!-- Firebase Compat Library -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
      authDomain: "mirdhuna-25542.firebaseapp.com",
      databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
      projectId: "mirdhuna-25542",
      storageBucket: "mirdhuna-25542.firebasestorage.app",
      messagingSenderId: "575924409876",
      appId: "1:575924409876:web:6ba1ed88ce941d9c83b901"
    };
    firebase.initializeApp(firebaseConfig);

    // Load last 5 chat MESSAGES with media support
    function loadChatMessages() {
      const chatContainer = document.getElementById("chat-container");
      chatContainer.innerHTML = '<p style="text-align:center; color:#999;">Loading messages...</p>';

      firebase.database().ref("messages").once("value", (snapshot) => {
        if (!snapshot.exists()) {
          chatContainer.innerHTML = '<p style="text-align:center; color:#999;">No messages yet</p>';
          return;
        }

        const messagesObj = snapshot.val();
        const messages = Object.entries(messagesObj)
          .map(([key, msg]) => ({ ...msg, key }))
          .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
          .slice(0, 5)
          .reverse();

        chatContainer.innerHTML = "";
        messages.forEach((msg) => {
          const div = document.createElement("div");
          div.className = "chat-item";
          
          // Show text, images, or video indicator
          let content = msg.text?.substring(0, 80) || "";
          if (msg.imageUrl && !content) content = "🖼️ Image";
          if (msg.videoUrl && !content) content = "🎥 Video";
          if (!content) content = "(Media)";
          
          // Display thumbnail if image exists
          if (msg.imageUrl) {
            div.innerHTML = `<div><strong>${msg.user || "User"}:</strong> 🖼️ Photo</div><img src="${msg.imageUrl}" style="width:60px; height:60px; object-fit:cover; border-radius:4px; margin-top:5px;">`;
          } else if (msg.videoUrl) {
            div.innerHTML = `<strong>${msg.user || "User"}:</strong> 🎥 Video`;
          } else {
            div.innerHTML = `<strong>${msg.user || "User"}:</strong> ${content}${msg.text?.length > 80 ? "..." : ""}`;
          }
          
          chatContainer.appendChild(div);
        });
      }).catch((error) => {
        console.error("Chat error:", error);
        chatContainer.innerHTML = '<p style="text-align:center; color:red;">Error loading messages</p>';
      });
    }

    // Load first 5 SELL LISTINGS
    function loadListings() {
      const sellContainer = document.getElementById("sell-container");
      sellContainer.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1/-1;">Loading listings...</p>';

      const storageRef = firebase.storage().ref("listings");
      storageRef.listAll()
        .then((res) => {
          if (res.prefixes.length === 0) {
            sellContainer.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1/-1;">No listings yet</p>';
            return;
          }

          // Get only first 5 listings sorted by newest
          const promises = res.prefixes
            .map((folderRef) => {
              return folderRef.child("data.json")
                .getDownloadURL()
                .then((url) => fetch(url).then((r) => r.json()))
                .catch(() => null);
            });

          Promise.all(promises)
            .then((items) => {
              const validItems = items
                .filter(Boolean)
                .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
                .slice(0, 5);
              
              sellContainer.innerHTML = "";

              if (validItems.length === 0) {
                sellContainer.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1/-1;">No valid listings</p>';
                return;
              }

              validItems.forEach((item) => {
                const card = document.createElement("div");
                card.className = "sell-item-card";
                const imgSrc = item.images?.[0] || "https://via.placeholder.com/150?text=No+Image";
                
                card.innerHTML = `
                  <img src="${imgSrc}" alt="${item.title}" style="width:100%; height:100px; object-fit:cover; border-radius:4px; margin-bottom:5px;" onerror="this.src='https://via.placeholder.com/150?text=No+Image'" />
                  <div style="font-weight:bold; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title || "Item"}</div>
                  <div style="color:#25D366; font-weight:bold;">₹${item.price || "N/A"}</div>
                  <div style="color:#666; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">📍 ${item.location || "Unknown"}</div>
                `;
                sellContainer.appendChild(card);
              });
            })
            .catch((error) => {
              console.error("Listing fetch error:", error);
              sellContainer.innerHTML = '<p style="text-align:center; color:red; grid-column: 1/-1;">Error loading listings</p>';
            });
        })
        .catch((error) => {
          console.error("Storage error:", error);
          sellContainer.innerHTML = '<p style="text-align:center; color:red; grid-column: 1/-1;">Storage unavailable</p>';
        });
    }

    // Load NEWS - using sample news with images
    function loadNews() {
      const newsContainer = document.getElementById("news-container");
      
      const newsItems = [
        { title: "Sono Village Update", desc: "Latest news and updates from the region", icon: "📢" },
        { title: "Weather Forecast", desc: "Today's weather and forecast for tomorrow", icon: "🌤️" },
        { title: "Business News", desc: "New shops and business opportunities", icon: "🏪" },
        { title: "Agriculture Update", desc: "Farming tips and current market prices", icon: "🌾" },
        { title: "Community Events", desc: "Upcoming events and celebrations", icon: "🎉" }
      ];

      newsContainer.innerHTML = "";
      newsItems.slice(0, 5).forEach((item) => {
        const div = document.createElement("div");
        div.className = "news-item";
        div.innerHTML = `
          <div class="news-item-title">${item.icon} ${item.title}</div>
          <div class="news-item-desc">${item.desc}</div>
        `;
        newsContainer.appendChild(div);
      });
    }

    // Load page sections (header, weather, slider, etc)
    async function loadSection(divElement) {
      const file = divElement.dataset.html;
      const useJs = divElement.dataset.js !== "false";

      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`${file} not found`);
        
        const html = await res.text();
        const temp = document.createElement("div");
        temp.innerHTML = html;

        // Move styles to head
        temp.querySelectorAll("style").forEach(style => document.head.appendChild(style));

        // Insert content excluding style tags
        divElement.innerHTML = temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi, '');

        // Load associated JS if enabled
        if (useJs) {
          const jsFile = file.replace(".html", ".js");
          const response = await fetch(jsFile);
          if (response.ok) {
            const script = document.createElement("script");
            script.type = "module";
            script.src = jsFile;
            document.body.appendChild(script);
          }
        }
      } catch (error) {
        console.error(`Error loading ${file}:`, error);
      }
    }

    // Initialize when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
      // Load main page sections
      document.querySelectorAll("[data-html]").forEach(loadSection);
      
      // Load Firebase data after a delay to ensure Firebase is ready
      setTimeout(() => {
        loadChatMessages();
        loadListings();
        loadNews();
      }, 1500);
    });
  </script>

</body>
</html>
