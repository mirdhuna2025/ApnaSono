<style>
/* ===== GLOBAL VARIABLES ===== */
:root{
--primary:#6366f1;
--primary-dark:#4f46e5;
--secondary:#8b5cf6;
--accent:#ec4899;
--bg-gradient:linear-gradient(135deg,#f0f9ff,#e0e7ff);
--card-bg:rgba(255,255,255,0.85);
--shadow-sm:0 4px 12px rgba(0,0,0,0.08);
--shadow-md:0 10px 25px rgba(0,0,0,0.12);
--border-radius:20px;
--transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}

*{box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
margin:0;
background:var(--bg-gradient);
color:#1e293b;
}

/* ===== CONTAINER SECTIONS ===== */
.container-section{
max-width:1200px;
margin:20px auto;
padding:0 10px;
background:white;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.container-title{
font-size:24px;
font-weight:bold;
padding:15px;
color:#333;
border-bottom:2px solid #25D366;
}

.container-content{
padding:15px;
min-height:200px;
}

/* ===== CHAT PREVIEW ===== */
#chat-container{
display:flex;
flex-direction:column;
gap:16px;
padding:10px;
max-height:500px;
overflow-y:auto;
}

.message{
background: var(--card-bg);
padding:18px;
border-radius: var(--border-radius);
box-shadow: var(--shadow-sm);
backdrop-filter: blur(10px);
border:1px solid rgba(226,232,240,0.6);
position: relative;
animation: fadeIn 0.4s ease-out;
}

.message .header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.message img.profile{
width:44px;
height:44px;
border-radius:50%;
border:2px solid var(--primary);
flex-shrink:0;
}

.name-line{
font-weight:600;
font-size:15px;
color:#1e293b;
}

.meta{
font-size:12px;
color:#64748b;
font-weight:500;
}

.content{
font-size:15px;
color:#334155;
word-break:break-word;
line-height:1.5;
white-space:pre-wrap;
}

.media-content{
max-width:100%;
max-height:190px;
border-radius:16px;
margin:10px 0;
cursor:pointer;
transition:var(--transition);
object-fit:cover;
border:1px solid #e2e8f0;
}

.media-content:hover{
transform:scale(1.01);
box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

@keyframes fadeIn {
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== OTHER SECTIONS ===== */
#sell-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.sell-item-card{
background:#f9f9f9;
border-radius:6px;
padding:10px;
text-align:center;
font-size:12px;
border:1px solid #ddd;
}

.sell-item-card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:4px;
margin-bottom:5px;
}

#news-container{
display:flex;
flex-direction:column;
gap:10px;
}

.news-item{
padding:12px;
background:#f5f5f5;
border-left:4px solid #25D366;
border-radius:4px;
font-size:14px;
}

.news-item-title{
font-weight:bold;
margin-bottom:5px;
color:#222;
}

.news-item-desc{
color:#666;
font-size:12px;
}

.view-all-link{
text-align:right;
padding:10px 15px;
border-top:1px solid #eee;
}

.view-all-link a{
color:#25D366;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.view-all-link a:hover{
text-decoration:underline;
}
</style>

<script>
const firebaseConfig={
apiKey:"AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain:"mirdhuna-25542.firebaseapp.com",
databaseURL:"https://mirdhuna-25542-default-rtdb.firebaseio.com",

appId:"1:575924409876:web:6ba1ed88ce941d9c83b901"
};
firebase.initializeApp(firebaseConfig);

/* ===== HELPER ===== */
function getMediaType(url){
if(!url) return null;
const decoded = decodeURIComponent(url).toLowerCase();
if(/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/.test(decoded)) return 'image';
if(/\.(mp4|webm|ogg|mov|avi)(\?|$)/.test(decoded)) return 'video';
if(/\.(mp3|wav|aac|ogg|m4a|flac)(\?|$)/.test(decoded)) return 'audio';
if(url.includes('image')||url.includes('photo')||url.includes('img')) return 'image';
if(url.includes('video')||url.includes('vid')) return 'video';
if(url.includes('audio')||url.includes('voice')||url.includes('recording')) return 'audio';
return null;
}

/* ===== LOAD CHAT ===== */
function loadChatMessages(){
const chatContainer=document.getElementById("chat-container");
chatContainer.innerHTML='<p style="text-align:center;color:#999;">Loading messages...</p>';

firebase.database().ref("messages").once("value")
.then(snapshot=>{
if(!snapshot.exists()){chatContainer.innerHTML='<p style="text-align:center;color:#999;">No messages yet</p>'; return;}
const messages=Object.entries(snapshot.val())
.map(([key,msg])=>({...msg,key}))
.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
.slice(0,5)
.reverse();

chatContainer.innerHTML="";
messages.forEach(msg=>{
const div=document.createElement("div");
div.className="message";

/* MEDIA */
const mediaUrl=msg.imageUrl||msg.videoUrl||msg.audioUrl||msg.mediaUrl||msg.fileUrl||null;
const mediaType=getMediaType(mediaUrl);

let mediaHTML='';
if(mediaType==='image') mediaHTML=`<img class="media-content" src="${mediaUrl}" onclick="window.open('${mediaUrl}','_blank')">`;
else if(mediaType==='video') mediaHTML=`<video class="media-content" controls><source src="${mediaUrl}">Your browser does not support video</video>`;
else if(mediaType==='audio') mediaHTML=`<audio class="media-content" controls><source src="${mediaUrl}">Your browser does not support audio</audio>`;
else if(mediaUrl) mediaHTML=`<a href="${mediaUrl}" target="_blank" style="color:#25D366;">📎 View Attachment</a>`;

/* MESSAGE HTML */
div.innerHTML=`
<div class="header">
<img class="profile" src="https://api.dicebear.com/7.x/thumbs/svg?seed=${msg.user||'User'}">
<div>
<div class="name-line">${msg.user||'User'}</div>
<div class="meta">${new Date(msg.timestamp||Date.now()).toLocaleString()}</div>
</div>
</div>
<div class="content">${msg.text||''}</div>
${mediaHTML}
`;
chatContainer.appendChild(div);
});
})
.catch(err=>{console.error(err); chatContainer.innerHTML='<p style="text-align:center;color:red;">Error loading messages</p>';});
}

/* ===== LOAD LISTINGS ===== */
function loadListings(){
const sellContainer=document.getElementById("sell-container");
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">Loading listings...</p>';

firebase.storage().ref("listings").listAll()
.then(res=>{
if(res.prefixes.length===0){sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>'; return;}
const promises=res.prefixes.map(folderRef=>folderRef.child("data.json").getDownloadURL().then(url=>fetch(url).then(r=>r.json())).catch(()=>null));
Promise.all(promises).then(items=>{
const valid=items.filter(Boolean).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,4);
if(valid.length===0){sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>'; return;}
sellContainer.innerHTML="";
valid.forEach(item=>{
const card=document.createElement("div");
card.className="sell-item-card";
const img=item.images?.[0]||"https://via.placeholder.com/150?text=No+Image";
card.innerHTML=`<img src="${img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'"><div style="font-weight:bold;">${item.title||'Item'}</div><div style="color:#25D366;font-weight:bold;">₹${item.price||'N/A'}</div><div style="font-size:11px;color:#666;">📍 ${item.location||'Unknown'}</div>`;
sellContainer.appendChild(card);
});
});
})
.catch(err=>{console.error(err); sellContainer.innerHTML='<p style="text-align:center;color:red;grid-column:1/-1;">Error loading listings</p>';});
}

/* ===== LOAD NEWS ===== */
function loadNews(){
const newsContainer=document.getElementById("news-container");
newsContainer.innerHTML='<p style="text-align:center;color:#999;">Loading news...</p>';
firebase.database().ref("news").once("value")
.then(snapshot=>{
if(!snapshot.exists()){newsContainer.innerHTML='<p style="text-align:center;color:#999;">No news yet</p>'; return;}
const news=Object.entries(snapshot.val()).map(([k,v])=>({...v,k})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).slice(0,5);
if(news.length===0){newsContainer.innerHTML='<p style="text-align:center;color:#999;">No news yet</p>'; return;}
newsContainer.innerHTML="";
news.forEach(item=>{
const div=document.createElement("div");
div.className="news-item";
div.innerHTML=`<div class="news-item-title">${item.title||'Untitled'}</div><div class="news-item-desc">${item.description||item.content||''}</div>`;
newsContainer.appendChild(div);
});
})
.catch(err=>{console.error(err); newsContainer.innerHTML='<p style="text-align:center;color:red;">Error loading news</p>';});
}

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded",()=>{
loadChatMessages();
loadListings();
loadNews();
});
</script>
