/* ===========================
HELPER: Detect media type from URL
Firebase Storage URLs have extensions INSIDE the path, not at the end
Example: https://firebasestorage.googleapis.com/v0/b/bucket/o/images%2Fphoto.jpg?alt=media&token=xxx
=========================== */

function getMediaType(url) {
if (!url) return null;
  
// Decode URL to check for extensions (Firebase encodes paths)
const decodedUrl = decodeURIComponent(url).toLowerCase();
  
// Check for image extensions
if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i.test(decodedUrl)) {
return 'image';
}
  
// Check for video extensions
if (/\.(mp4|webm|ogg|mov|avi)(\?|$)/i.test(decodedUrl)) {
return 'video';
}
  
// Check for audio extensions
if (/\.(mp3|wav|aac|ogg|m4a|flac)(\?|$)/i.test(decodedUrl)) {
return 'audio';
}
  
// Check content type hints in URL if present
if (url.includes('image') || url.includes('photo') || url.includes('img')) {
return 'image';
}
  
if (url.includes('video') || url.includes('vid')) {
return 'video';
}
  
if (url.includes('audio') || url.includes('voice') || url.includes('recording')) {
return 'audio';
}
  
return null;
}

/* ===========================
LISTINGS

function loadListings(){

const sellContainer=document.getElementById("sell-container");

sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">Loading listings...</p>';

const storageRef=firebase.storage().ref("listings");

storageRef.listAll()
.then((res)=>{

if(res.prefixes.length===0){
sellContainer.innerHTML='<p style="text-align:center;color:#999;grid-column:1/-1;">No listings yet</p>';
return;
}

const promises=res.prefixes.map((folderRef)=>{
return folderRef.child("data.json")
.getDownloadURL()
.then((url)=>fetch(url).then((r)=>r.json()))
.catch(()=>null);
});

Promise.all(promises)
.then((items)=>{

const validItems=items
.filter(Boolean)
.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
.slice(0,4);

function loadNews(){

.then((snapshot)=>{

const newsObj=snapshot.val();

const newsItems=Object.entries(newsObj)
.map(([key,item])=>({...item,key}))

/* ===========================
LOAD PAGE SECTIONS

async function loadSection(divElement){

const file=divElement.dataset.html;
const useJs=divElement.dataset.js!=="false";

try{

const res=await fetch(file);
const html=await res.text();

const temp=document.createElement("div");
temp.innerHTML=html;

temp.querySelectorAll("style").forEach(style=>document.head.appendChild(style));

divElement.innerHTML=temp.innerHTML.replace(/<style[\s\S]*?<\/style>/gi,'');

if(useJs){

const jsFile=file.replace(".html",".js");

const response=await fetch(jsFile);

if(response.ok){

const script=document.createElement("script");
script.type="module";
script.src=jsFile;

document.body.appendChild(script);

}

}

}catch(error){

console.error(`Error loading ${file}:`,error);

}

}
