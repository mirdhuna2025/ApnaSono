<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WhatsApp Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f0f2f5;
}

header{
background:#075e54;
color:white;
padding:14px;
font-size:18px;
}

#statusBar{
display:flex;
gap:12px;
padding:10px;
overflow-x:auto;
background:white;
}

.status{
text-align:center;
font-size:12px;
}

.status img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #25D366;
object-fit:cover;
cursor:pointer;
}

#uploadStatus{
width:70px;
height:70px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
}

#viewer img{
max-width:100%;
max-height:100%;
}

</style>

</head>
<body>

<header> Status </header>

<div id="statusBar">

<div class="status">
<div id="uploadStatus">+</div>
<div>My Status</div>
<input type="file" id="fileInput" hidden>
</div>

<div id="statusList" style="display:flex;gap:12px;"></div>

</div>


<div id="viewer" onclick="this.style.display='none'">
<img id="viewImg">
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";



const firebaseConfig = {
  apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
  authDomain: "mirdhuna-25542.firebaseapp.com",
  databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
  projectId: "mirdhuna-25542",
  storageBucket: "mirdhuna-25542.appspot.com",
  messagingSenderId: "575924409876",
  appId: "1:575924409876:web:6ba1ed88ce941d9c83b901",
  measurementId: "G-YB7LDKHBPV"
};



const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);


// upload status

const uploadBtn=document.getElementById("uploadStatus");
const fileInput=document.getElementById("fileInput");

uploadBtn.onclick=()=>{
fileInput.click();
}

fileInput.onchange=async(e)=>{

let file=e.target.files[0];
if(!file) return;

let path="status/"+Date.now();

let storageRef=sRef(storage,path);

await uploadBytes(storageRef,file);

let url=await getDownloadURL(storageRef);

push(ref(db,"status"),{
img:url,
time:Date.now()
});

}


// load statuses

const statusList=document.getElementById("statusList");

onChildAdded(ref(db,"status"),(data)=>{

let d=data.val();

let div=document.createElement("div");
div.className="status";

div.innerHTML=`
<img src="${d.img}">
<div>Status</div>
`;

div.onclick=()=>{
document.getElementById("viewer").style.display="flex";
document.getElementById("viewImg").src=d.img;
}

statusList.appendChild(div);

});


</script>

</body>
</html>
