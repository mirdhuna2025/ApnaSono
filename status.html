<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status Stories</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

.header{
padding:20px;
text-align:center;
font-size:20px;
}

.topbar{
display:flex;
align-items:center;
gap:15px;
padding:10px 15px;
}

.upload{
width:70px;
height:70px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:3px solid white;
}

.upload i{
font-size:30px;
color:white;
}

.story-bar{
display:flex;
overflow-x:auto;
gap:15px;
}

.story{
text-align:center;
cursor:pointer;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #25D366;
object-fit:cover;
}

.story p{
font-size:12px;
margin-top:5px;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.viewer img,.viewer video{
max-width:95%;
max-height:85%;
}

.progress{
width:90%;
height:4px;
background:#333;
margin-bottom:10px;
}

.bar{
height:4px;
background:#25D366;
width:0%;
}

.reactions{
position:absolute;
bottom:10px;
display:flex;
gap:15px;
}

.reactions i{
font-size:25px;
cursor:pointer;
}

.seen-list{
position:absolute;
bottom:50px;
right:10px;
background:rgba(0,0,0,0.6);
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

input{
display:none;
}

</style>
</head>

<body>

<div class="header">Status</div>

<div class="topbar">

<label class="upload">
<input type="file" id="uploadFile" accept="image/*,video/*" capture="environment">
<i class="fa fa-plus"></i>
</label>

<div class="story-bar" id="stories"></div>

</div>


<div class="viewer" id="viewer">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<img id="viewImg">
<video id="viewVideo" controls></video>

<div class="reactions">
<i class="fa-regular fa-heart" id="likeBtn"></i>
<i class="fa-regular fa-face-smile" id="smileBtn"></i>
</div>

<div class="seen-list" id="seenList"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain: "mirdhuna-25542.firebaseapp.com",
databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId: "mirdhuna-25542",
storageBucket: "mirdhuna-25542.firebasestorage.app",
messagingSenderId: "575924409876",
appId: "1:575924409876:web:6ba1ed88ce941d9c83b901"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const upload = document.getElementById("uploadFile");
const storiesDiv = document.getElementById("stories");


// UPLOAD STATUS

upload.addEventListener("change", async ()=>{

const file = upload.files[0];

if(!file) return;

const storageRef = sRef(storage,"status/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

const url = await getDownloadURL(storageRef);

push(ref(db,"status"),{
url:url,
type:file.type,
time:Date.now(),
name:"User",
reactions:{},
seen:{}
});

upload.value="";

});


// FETCH STORIES

onValue(ref(db,"status"),snapshot=>{

storiesDiv.innerHTML="";

snapshot.forEach(data=>{

const status = data.val();

if(Date.now()-status.time > 86400000){
remove(ref(db,"status/"+data.key));
return;
}

const div=document.createElement("div");
div.className="story";

const img=document.createElement("img");
img.src=status.url;

const name=document.createElement("p");
name.innerText=status.name;

div.appendChild(img);
div.appendChild(name);

div.onclick=()=>openViewer(status,data.key);

storiesDiv.appendChild(div);

});

});


// VIEWER

const viewer=document.getElementById("viewer");
const img=document.getElementById("viewImg");
const video=document.getElementById("viewVideo");
const bar=document.getElementById("bar");
const seenList=document.getElementById("seenList");

const likeBtn=document.getElementById("likeBtn");
const smileBtn=document.getElementById("smileBtn");

let progressInterval;


function openViewer(status,statusKey){

viewer.style.display="flex";

bar.style.width="0%";

let progress=0;


// SEEN LIST

const seenRef = ref(db,"status/"+statusKey+"/seen/"+Date.now());

update(seenRef,{name:"Viewer"});


onValue(ref(db,"status/"+statusKey+"/seen"),snap=>{

let names=[];

snap.forEach(s=>{
names.push(s.val().name);
});

seenList.innerText="Seen: "+names.join(", ");

});


// PROGRESS BAR

clearInterval(progressInterval);

progressInterval=setInterval(()=>{

progress+=2;

bar.style.width=progress+"%";

if(progress>=100){

clearInterval(progressInterval);

viewer.style.display="none";

}

},100);


// IMAGE OR VIDEO

if(status.type.startsWith("image")){

img.style.display="block";
video.style.display="none";

img.src=status.url;

}else{

video.style.display="block";
img.style.display="none";

video.src=status.url;
video.play();

}


// REACTIONS

likeBtn.onclick=()=>addReaction(statusKey,"❤️");
smileBtn.onclick=()=>addReaction(statusKey,"😊");

}


// ADD REACTION

function addReaction(statusKey,reaction){

const reactionRef = ref(db,"status/"+statusKey+"/reactions/"+Date.now());

update(reactionRef,{reaction});

}

</script>

</body>
</html>
