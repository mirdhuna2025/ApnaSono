<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mirdhuna Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#e5ddd5;
}

header{
background:#075e54;
color:white;
padding:12px;
font-size:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

#statusBar{
display:flex;
overflow-x:auto;
background:white;
padding:8px;
gap:10px;
border-bottom:1px solid #ccc;
}

.status{
width:70px;
text-align:center;
font-size:12px;
}

.status img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #25D366;
object-fit:cover;
}

#uploadStatus{
width:60px;
height:60px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

#chatBox{
height:65vh;
overflow-y:auto;
padding:10px;
}

.msg{
max-width:70%;
padding:8px;
margin:6px;
border-radius:8px;
}

.me{
background:#dcf8c6;
margin-left:auto;
}

.other{
background:white;
}

#sendBar{
display:flex;
padding:10px;
background:#f0f0f0;
}

#msgInput{
flex:1;
padding:8px;
border:none;
border-radius:20px;
}

button{
background:#25D366;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
margin-left:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Mirdhuna Chat
</header>

<!-- STATUS -->
<div id="statusBar">

<div class="status">
<div id="uploadStatus">+</div>
<div>Your Status</div>
<input type="file" id="statusFile" hidden>
</div>

<div id="statusList" style="display:flex; gap:10px;"></div>

</div>

<!-- CHAT -->
<div id="chatBox"></div>

<!-- SEND -->
<div id="sendBar">
<input id="msgInput" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
authDomain: "mirdhuna-25542.firebaseapp.com",
databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
projectId: "mirdhuna-25542",
storageBucket: "mirdhuna-25542.appspot.com",
messagingSenderId: "575924409876",
appId: "1:575924409876:web:6ba1ed88ce941d9c83b901",
measurementId: "G-YB7LDKHBPV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const user = localStorage.uid || Math.random().toString(36).substr(2);
localStorage.uid = user;

const chatBox = document.getElementById("chatBox");

function sendMsg(){

let text = document.getElementById("msgInput").value;
if(!text) return;

push(ref(db,"messages"),{
user:user,
msg:text
});

document.getElementById("msgInput").value="";
}

onChildAdded(ref(db,"messages"),(data)=>{

let d=data.val();

let div=document.createElement("div");
div.className="msg "+(d.user==user?"me":"other");
div.innerText=d.msg;

chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;

});


// STATUS UPLOAD

document.getElementById("uploadStatus").onclick=()=>{
document.getElementById("statusFile").click();
}

document.getElementById("statusFile").onchange=async(e)=>{

let file=e.target.files[0];
if(!file) return;

let storageRef=sRef(storage,"status/"+Date.now());

await uploadBytes(storageRef,file);

let url=await getDownloadURL(storageRef);

push(ref(db,"status"),{
img:url,
user:user
});

}


// STATUS LIST

const statusList=document.getElementById("statusList");

onChildAdded(ref(db,"status"),(data)=>{

let d=data.val();

let div=document.createElement("div");
div.className="status";

div.innerHTML=`
<img src="${d.img}">
<div>Status</div>
`;

statusList.appendChild(div);

});


</script>

</body>
</html>
