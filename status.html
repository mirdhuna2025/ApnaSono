<style>
.status-container {
  width: 100%;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
}

.status-header {
  background: linear-gradient(135deg, #25D366, #128C7E);
  padding: 15px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.status-header button {
  background: rgba(255,255,255,0.3);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s ease;
}

.status-header button:hover {
  background: rgba(255,255,255,0.5);
}

.story-bar {
  display: flex;
  overflow-x: auto;
  padding: 15px;
  background: #f9f9f9;
  gap: 15px;
  border-bottom: 1px solid #eee;
}

.story {
  margin: 0;
  text-align: center;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}

.story img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid #25D366;
  object-fit: cover;
  transition: transform 0.2s ease;
}

.story img:hover {
  transform: scale(1.05);
}

.story p {
  font-size: 12px;
  margin: 5px 0 0 0;
  color: #333;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.status-content {
  padding: 20px;
  min-height: 150px;
  text-align: center;
  color: #999;
}

.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10000;
}

.viewer img,
.viewer video {
  max-width: 95%;
  max-height: 85%;
  border-radius: 8px;
}

.progress {
  width: 90%;
  height: 4px;
  background: #333;
  margin-bottom: 10px;
  border-radius: 2px;
}

.bar {
  height: 4px;
  background: #25D366;
  width: 0%;
  border-radius: 2px;
}

.upload {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(37,211,102,0.3);
  transition: transform 0.2s ease;
  border: none;
  color: white;
  z-index: 1000;
}

.upload:hover {
  transform: scale(1.1);
}

.upload input {
  display: none;
}

.reactions {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  font-size: 25px;
}

.reactions span {
  cursor: pointer;
  transition: transform 0.2s ease;
}

.reactions span:hover {
  transform: scale(1.2);
}

.seen-list {
  position: absolute;
  bottom: 50px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
  max-width: 200px;
  text-align: right;
}

@media (max-width: 768px) {
  .upload {
    bottom: 20px;
    right: 20px;
  }
  
  .story-bar {
    padding: 10px;
  }
}
</style>

<div class="status-container">
  <div class="status-header">
    📸 Status Stories
    <button id="statusLoginBtn">Login</button>
  </div>
  
  <div class="story-bar" id="stories"></div>
  
  <div class="status-content">
    <p id="statusMsg">Load stories above...</p>
  </div>
</div>

<div class="viewer" id="viewer">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <img id="viewImg" style="display:none;">
  <video id="viewVideo" controls style="display:none;"></video>
  <div class="reactions">
    <span id="likeBtn" title="Like">❤️</span>
    <span id="smileBtn" title="React">😊</span>
  </div>
  <div class="seen-list" id="seenList"></div>
</div>

<label class="upload" id="uploadBtn" title="Add Status">
  +
  <input type="file" id="uploadFile" accept="image/*,video/*" capture="environment">
</label>

<script>
// Use the existing Firebase instance from the parent page
if (typeof firebase !== 'undefined') {
  const db = firebase.database();
  const storage = firebase.storage();
  const auth = firebase.auth();
  
  let currentUser = null;

  // Check authentication state
  if (typeof firebase.auth !== 'undefined') {
    firebase.auth().onAuthStateChanged(user => {
      currentUser = user;
      const loginBtn = document.getElementById('statusLoginBtn');
      if (user) {
        loginBtn.innerText = 'Logout (' + user.displayName + ')';
        loginBtn.onclick = () => firebase.auth().signOut();
      } else {
        loginBtn.innerText = 'Login';
        loginBtn.onclick = () => {
          if (typeof gapi !== 'undefined') {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider);
          }
        };
      }
    });
  }

  // Load stories
  function loadStatusStories() {
    const storiesDiv = document.getElementById('stories');
    const statusMsg = document.getElementById('statusMsg');
    
    db.ref('status').on('value', snapshot => {
      storiesDiv.innerHTML = '';
      
      if (!snapshot.exists()) {
        statusMsg.textContent = 'No status stories yet';
        return;
      }

      let count = 0;
      snapshot.forEach(data => {
        const status = data.val();
        
        // Remove expired statuses (older than 24 hours)
        if (Date.now() - (status.time || 0) > 86400000) {
          db.ref('status/' + data.key).remove();
          return;
        }

        count++;
        const div = document.createElement('div');
        div.className = 'story';
        
        const img = document.createElement('img');
        img.src = status.url || 'https://via.placeholder.com/70?text=Status';
        img.onerror = () => img.src = 'https://via.placeholder.com/70?text=Error';
        
        const name = document.createElement('p');
        name.textContent = (status.name || 'User').substring(0, 12);

        div.appendChild(img);
        div.appendChild(name);
        div.onclick = () => openViewer(status, data.key);
        storiesDiv.appendChild(div);
      });

      if (count === 0) {
        statusMsg.textContent = 'No status stories yet';
      }
    });
  }

  // Open viewer
  const viewer = document.getElementById('viewer');
  const viewImg = document.getElementById('viewImg');
  const viewVideo = document.getElementById('viewVideo');
  const bar = document.getElementById('bar');
  const seenListDiv = document.getElementById('seenList');
  const likeBtn = document.getElementById('likeBtn');
  const smileBtn = document.getElementById('smileBtn');

  let progressInterval;

  function openViewer(status, statusKey) {
    if (!currentUser) {
      alert('Please login to view status');
      return;
    }

    viewer.style.display = 'flex';
    bar.style.width = '0%';
    let progress = 0;

    // Mark as seen
    db.ref('status/' + statusKey + '/seen/' + currentUser.uid).set({
      name: currentUser.displayName
    });

    // Show seen list
    db.ref('status/' + statusKey + '/seen').on('value', snap => {
      let names = [];
      snap.forEach(s => {
        names.push(s.val().name);
      });
      seenListDiv.textContent = 'Seen: ' + names.join(', ');
    });

    // Progress bar
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      progress += 2;
      bar.style.width = progress + '%';
      if (progress >= 100) {
        clearInterval(progressInterval);
        viewer.style.display = 'none';
      }
    }, 100);

    // Show media
    const mediaType = status.type || status.url;
    if (mediaType.includes('image')) {
      viewImg.style.display = 'block';
      viewVideo.style.display = 'none';
      viewImg.src = status.url;
    } else {
      viewVideo.style.display = 'block';
      viewImg.style.display = 'none';
      viewVideo.src = status.url;
      viewVideo.play();
    }

    // Reactions
    likeBtn.onclick = () => addReaction(statusKey, '❤️');
    smileBtn.onclick = () => addReaction(statusKey, '😊');
  }

  function addReaction(statusKey, reaction) {
    if (!currentUser) return;
    db.ref('status/' + statusKey + '/reactions/' + currentUser.uid).set({
      reaction: reaction,
      time: Date.now()
    });
  }

  // Upload status
  document.getElementById('uploadFile').addEventListener('change', async (e) => {
    if (!currentUser) {
      alert('Please login first');
      return;
    }

    const file = e.target.files[0];
    if (!file) return;

    const storageRef = storage.ref('status/' + Date.now() + '_' + file.name);
    
    try {
      await storageRef.put(file);
      const url = await storageRef.getDownloadURL();
      
      db.ref('status').push({
        url: url,
        type: file.type,
        time: Date.now(),
        uid: currentUser.uid,
        name: currentUser.displayName,
        reactions: {},
        seen: {}
      });

      document.getElementById('uploadFile').value = '';
      alert('Status uploaded!');
    } catch (err) {
      console.error('Upload error:', err);
      alert('Failed to upload status');
    }
  });

  // Close viewer on click
  viewer.addEventListener('click', () => {
    viewer.style.display = 'none';
  });

  // Initialize
  loadStatusStories();
} else {
  console.warn('Firebase not loaded yet. Status features may not work.');
}
</script>
