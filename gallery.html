<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Full Image Gallery</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    h1 { text-align: center; }
    .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .gallery img { max-width: 200px; max-height: 200px; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.3s; }
    .gallery img:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>Firebase Full Image Gallery</h1>
  <div class="gallery" id="gallery"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
      authDomain: "mirdhuna-25542.firebaseapp.com",
      databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
      projectId: "mirdhuna-25542",
      storageBucket: "mirdhuna-25542.firebasestorage.app",
      messagingSenderId: "575924409876",
      appId: "1:575924409876:web:6ba1ed88ce941d9c83b901"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const gallery = document.getElementById("gallery");

    function addImage(url) {
      const img = document.createElement("img");
      img.src = url;
      gallery.appendChild(img);
    }

    // 🔹 Recursively traverse Realtime Database
    function traverseDatabase(snapshot) {
      const data = snapshot.val();
      if (!data) return;

      if (typeof data === 'string' && data.startsWith('http')) {
        addImage(data);
      } else if (typeof data === 'object') {
        Object.values(data).forEach(val => {
          if (typeof val === 'string' && val.startsWith('http')) {
            addImage(val);
          } else if (typeof val === 'object') {
            traverseDatabase({ val: () => val });
          }
        });
      }
    }

    db.ref().once('value').then(snapshot => traverseDatabase(snapshot));

    // 🔹 Recursively traverse Firebase Storage
    async function listAllFiles(ref) {
      const result = await ref.listAll();
      for (const fileRef of result.items) {
        const url = await fileRef.getDownloadURL();
        addImage(url);
      }
      for (const folderRef of result.prefixes) {
        await listAllFiles(folderRef); // recursive call for subfolders
      }
    }

    const rootRef = storage.ref();
    listAllFiles(rootRef).catch(console.error);
  </script>
</body>
</html>
