<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Image Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      max-width: 200px;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Firebase Image Gallery</h1>
  <div class="gallery" id="gallery"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script>
    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ",
      authDomain: "mirdhuna-25542.firebaseapp.com",
      databaseURL: "https://mirdhuna-25542-default-rtdb.firebaseio.com",
      projectId: "mirdhuna-25542",
      storageBucket: "mirdhuna-25542.firebasestorage.app",
      messagingSenderId: "575924409876",
      appId: "1:575924409876:web:6ba1ed88ce941d9c83b901"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    const gallery = document.getElementById("gallery");

    // Function to add image to gallery
    function addImage(url) {
      const img = document.createElement("img");
      img.src = url;
      gallery.appendChild(img);
    }

    // 1️⃣ Load images from Realtime Database
    database.ref().once('value').then(snapshot => {
      snapshot.forEach(childSnapshot => {
        const data = childSnapshot.val();
        // If value is a URL
        if (typeof data === 'string' && data.startsWith('http')) {
          addImage(data);
        }
        // If value is an object with multiple images
        else if (typeof data === 'object') {
          Object.values(data).forEach(val => {
            if (typeof val === 'string' && val.startsWith('http')) {
              addImage(val);
            }
          });
        }
      });
    });

    // 2️⃣ Load all images from Firebase Storage
    const storageRef = storage.ref();
    storageRef.listAll().then(result => {
      result.items.forEach(fileRef => {
        fileRef.getDownloadURL().then(url => {
          addImage(url);
        });
      });
    }).catch(error => {
      console.error("Error loading storage images:", error);
    });
  </script>
</body>
</html>
